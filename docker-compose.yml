services:
  postgres:
    image: postgres:16-alpine
    container_name: atv1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-atv1}
      POSTGRES_USER: ${DB_USER:-atv1_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atv1_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atv1_user} -d ${DB_NAME:-atv1}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
